<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobsMitra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f4f6;
      padding: 40px;
      margin: 0;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #111827;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      background: #f9fafb;
      transition: border-color 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    button {
      margin-top: 30px;
      padding: 14px;
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>JobsMitra</h1>
    <form method="POST">
      <label>Date of Birth</label>
      <input type="date" name="dob" required>

      <label>Education</label>
      <select name="education" required>
        <option value="7th">7th / 8th Pass</option>
        <option value="10th">10th / Matriculation</option>
        <option value="ITI">ITI</option>
        <option value="12th">12th / Intermediate</option>
        <option value="Diploma">Diploma</option>
        <option value="Graduate">Graduate</option>
        <option value="Professional Graduate">Professional Graduate</option>
        <option value="Post Graduate">Post Graduate</option>
        <option value="PhD">PhD / Doctorate</option>
      </select>

      <label>State</label>
      <select name="state">
        <option value="All">All India</option>
        <option value="Maharashtra">Maharashtra</option>
        <option value="Gujarat">Gujarat</option>
        <option value="Karnataka">Karnataka</option>
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Uttar Pradesh">Uttar Pradesh</option>
        <option value="Rajasthan">Rajasthan</option>
        <option value="Bihar">Bihar</option>
        <option value="Delhi">Delhi</option>
        <option value="Madhya Pradesh">Madhya Pradesh</option>
        <option value="West Bengal">West Bengal</option>
      </select>

      <label>Category</label>
      <select name="category">
        <option value="General">General</option>
        <option value="OBC">OBC</option>
        <option value="SC">SC</option>
        <option value="ST">ST</option>
      </select>

      <button type="submit">Check Eligible Jobs</button>
    </form>
  </div>
</body>
</html>
