<!DOCTYPE html>
<html>

<head>

<title>JobsMitra</title>

<style>

body{
font-family: Arial;
background:#f3f6fb;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2c3e50;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#3498db;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="container">

<h1>JobsMitra</h1>

<form method="POST">

<label>Date of Birth</label>
<input type="date" name="dob" required>

<label>Education</label>
<select name="education" required>

<option value="7th">7th / 8th Pass</option>
<option value="10th">10th / Matriculation</option>
<option value="ITI">ITI</option>
<option value="12th">12th / Intermediate</option>
<option value="Diploma">Diploma</option>
<option value="Graduate">Graduate</option>
<option value="Professional Graduate">Professional Graduate</option>
<option value="Post Graduate">Post Graduate</option>
<option value="PhD">PhD / Doctorate</option>

</select>

<label>State</label>
<input type="text" name="state" placeholder="Example: Maharashtra" required>

<label>Category</label>
<select name="category">

<option value="General">General</option>
<option value="OBC">OBC</option>
<option value="SC">SC</option>
<option value="ST">ST</option>

</select>

<button type="submit">Check Eligible Jobs</button>

</form>

</div>

</body>

</html>
